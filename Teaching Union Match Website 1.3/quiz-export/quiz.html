<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quiz — Teaching Union Match (standalone export)</title>
<meta name="description" content="Standalone export of the WTU comparison quiz, for iterating on the question flow in isolation."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600&family=Source+Sans+3:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="src/styles.css"/>
<style>
  /* Minimal standalone chrome — just a slim header so the quiz has room to breathe.
     Nothing here affects the quiz itself; delete when re-embedding into the site. */
  .export-header {
    border-bottom: 1px solid var(--c-border);
    background: rgba(252,248,253,.85);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
  }
  .export-header .wrap {
    display: flex; align-items: center; gap: 16px;
    height: 88px; padding: 0 24px; max-width: var(--maxw); margin: 0 auto;
  }
  .export-header .wtu-mark { height: 52px; width: auto; }
  .export-header .title { font-family: var(--f-serif); font-size: 22px; color: var(--c-primary); }
  .export-header .title em { font-style: italic; color: var(--c-text-muted); font-size: 14px; font-family: var(--f-sans); letter-spacing: .04em; text-transform: uppercase; display: block; margin-top: 2px; }
  .quiz-wrap { padding: 48px 0 80px; }
  .result-split { grid-template-columns: 1fr 1fr; }
  @media (max-width: 640px) { .result-split { grid-template-columns: 1fr !important; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .quiz-option:hover { border-color: var(--c-primary) !important; background: var(--c-background-2) !important; }
</style>
</head>
<body data-page="quiz" data-photo-treatment="natural">

<header class="export-header">
  <div class="wrap">
    <img src="assets/brand/wtu-mark.png" alt="" class="wtu-mark"/>
    <div class="title">
      Teaching Union Match — quiz
      <em>standalone export</em>
    </div>
  </div>
</header>

<main class="quiz-wrap">
  <div class="wrap">
    <div id="quiz-root"></div>
  </div>
</main>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/analytics.js"></script>
<script src="src/data.js"></script>
<script src="src/quiz-engine.js"></script>
<script type="text/babel" src="src/Quiz.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('quiz-root'));
  root.render(<Quiz />);
</script>
</body>
</html>
