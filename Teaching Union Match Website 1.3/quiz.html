<style>
.quiz-wrap { padding: 48px 0 80px; }
.result-split { grid-template-columns: 1fr 1fr; }
@media (max-width: 640px) { .result-split { grid-template-columns: 1fr !important; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.quiz-option:hover { border-color: var(--c-primary) !important; background: var(--c-background-2) !important; }

/* ── Mobile quiz ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .quiz-wrap { padding: 28px 0 60px; }

  /* Question + intro cards: tighter padding so content fits 375px */
  .quiz-wrap .card { padding: 22px 18px !important; }

  /* Intro stats: 3-up too cramped at 375px */
  .intro-stats { grid-template-columns: 1fr !important; gap: 10px !important; }

  /* Result card header — stack the tier badge below the title row so the
     logo + name + chevron fit on the first row without collision */
  .quiz-wrap article.card > header {
    flex-wrap: wrap !important;
    gap: 12px !important;
    padding: 14px 16px !important;
  }
  .quiz-wrap article.card > header > div:nth-child(1) {
    /* logo */
    width: 56px !important;
    height: 44px !important;
  }
  .quiz-wrap article.card > header > div:nth-child(2) h3 {
    font-size: 18px !important;
  }
  .quiz-wrap article.card > header > div:nth-child(2) {
    flex-basis: calc(100% - 84px) !important;
  }
  .quiz-wrap article.card > header > div:nth-child(3) {
    /* tier badge: drop to its own row, full-width, left-aligned */
    order: 4;
    flex-basis: 100% !important;
    text-align: left !important;
  }
  .quiz-wrap article.card > header > svg {
    /* chevron sits with the title row */
    order: 3;
  }

  /* Result card body padding */
  .quiz-wrap article.card > div {
    padding: 4px 16px 18px !important;
  }

  /* Option button size */
  .quiz-option {
    padding: 14px 14px !important;
  }

  /* Result-card CTAs full-width tap targets */
  .quiz-wrap article.card .btn {
    width: 100%;
    justify-content: center;
  }

  /* "Worth understanding" + reflection asides: tighter padding */
  .quiz-wrap aside.card { padding: 20px 18px !important; }
}
</style>
