<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Explainer video — Teaching Union Match</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Public+Sans:wght@300;400;500;600;700&display=swap">

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a0f1f; }
  body {
    font-family: "Public Sans", system-ui, sans-serif;
    color: #332733;
  }
  /* Brand tokens — mirrored from the website */
  :root {
    --c-primary:        #6E3B7E;
    --c-primary-dark:   #5D316C;
    --c-primary-deeper: #3D2049;
    --c-secondary:      #B89AC9;
    --c-secondary-soft: #E4D5EC;
    --c-cream:          #FCF8FD;
    --c-cream-2:        #F5EDF6;
    --c-text:           #332733;
    --c-text-muted:     #6B6171;
    --c-accent:         #E07A5F;
    --c-accent-soft:    #FBE8E0;
    --c-success:        #2F7D57;
    --c-success-soft:   #E7F4EE;
    --c-border:         #E6D8EE;

    --f-serif: "Source Serif 4", Georgia, serif;
    --f-sans:  "Public Sans", system-ui, sans-serif;
  }

  /* Cut switcher in the top-right */
  .cut-switcher {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    padding: 4px;
    display: inline-flex;
    gap: 0;
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
    font-family: var(--f-sans);
  }
  .cut-switcher button {
    border: 0; background: transparent; cursor: pointer;
    padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    color: #6B6171;
    transition: all .15s ease;
  }
  .cut-switcher button.active {
    background: #6E3B7E; color: #fff;
  }
  .cut-switcher button:hover:not(.active) {
    background: rgba(110, 59, 126, .08);
    color: #6E3B7E;
  }
</style>
</head>
<body>

<div id="root" style="position:fixed; inset:0;"></div>

<div class="cut-switcher" id="cutSwitcher">
  <button data-cut="long" class="active">90s full</button>
  <button data-cut="short">30s teaser</button>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx?v=1"></script>
<script type="text/babel" src="scenes.jsx?v=8"></script>
<script type="text/babel" src="explainer.jsx?v=1"></script>

</body>
</html>
