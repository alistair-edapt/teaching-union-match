<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Compare teaching unions — Teaching Union Match</title>
<meta name="description" content="Take the free 2-minute quiz to compare UK teaching unions and alternative professional support. No sign-up, no tracking."/>
<meta name="robots" content="noindex"/>

<!-- Code-referenced resources (strings in JS, not HTML attrs) must be lifted
     via <meta> tags so the bundler can inline them. At runtime, each becomes
     a blob URL at window.__resources[data-resource-id]. -->

<!-- Brand marks used by src/layout.js (getMarkSrc switches by variant) -->
<meta name="ext-resource-dependency" content="assets/brand/mark-shields-fan.svg"   data-resource-id="markFan"/>
<meta name="ext-resource-dependency" content="assets/brand/mark-shields-stack.svg" data-resource-id="markStack"/>
<meta name="ext-resource-dependency" content="assets/brand/mark-shields-mono.svg"  data-resource-id="markMono"/>

<!-- Org logos referenced as strings in src/data.js -->
<meta name="ext-resource-dependency" content="assets/logos/neu.png"       data-resource-id="logo_neu"/>
<meta name="ext-resource-dependency" content="assets/logos/nasuwt.png"    data-resource-id="logo_nasuwt"/>
<meta name="ext-resource-dependency" content="assets/logos/edapt.jpg"     data-resource-id="logo_edapt"/>
<meta name="ext-resource-dependency" content="assets/logos/ascl.png"      data-resource-id="logo_ascl"/>
<meta name="ext-resource-dependency" content="assets/logos/naht.png"      data-resource-id="logo_naht"/>
<meta name="ext-resource-dependency" content="assets/logos/community.png" data-resource-id="logo_community"/>
<meta name="ext-resource-dependency" content="assets/logos/gmb.png"       data-resource-id="logo_gmb"/>
<meta name="ext-resource-dependency" content="assets/logos/unison.png"    data-resource-id="logo_unison"/>
<meta name="ext-resource-dependency" content="assets/logos/unite.png"     data-resource-id="logo_unite"/>
<meta name="ext-resource-dependency" content="assets/logos/eis.jpg"       data-resource-id="logo_eis"/>
<meta name="ext-resource-dependency" content="assets/logos/ahds.svg"      data-resource-id="logo_ahds"/>
<meta name="ext-resource-dependency" content="assets/logos/sls.png"       data-resource-id="logo_sls"/>
<meta name="ext-resource-dependency" content="assets/logos/ssta.png"      data-resource-id="logo_ssta"/>
<meta name="ext-resource-dependency" content="assets/logos/into.jpg"      data-resource-id="logo_into"/>
<meta name="ext-resource-dependency" content="assets/logos/utu.png"       data-resource-id="logo_utu"/>
<meta name="ext-resource-dependency" content="assets/logos/ucac.png"      data-resource-id="logo_ucac"/>

<!-- Nation-specific alt logos (present in altLogos map on some orgs) -->
<meta name="ext-resource-dependency" content="assets/logos/nasuwt-wales.png"    data-resource-id="logo_nasuwt_wales"/>
<meta name="ext-resource-dependency" content="assets/logos/nasuwt-scotland.jpeg" data-resource-id="logo_nasuwt_scotland"/>
<meta name="ext-resource-dependency" content="assets/logos/nasuwt-ni.png"       data-resource-id="logo_nasuwt_ni"/>
<meta name="ext-resource-dependency" content="assets/logos/naht-ni.png"         data-resource-id="logo_naht_ni"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600&family=Source+Sans+3:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="src/styles.css?v=11"/>
<style>
.quiz-wrap { padding: 48px 0 80px; }
.result-split { grid-template-columns: 1fr 1fr; }
@media (max-width: 640px) { .result-split { grid-template-columns: 1fr !important; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.quiz-option:hover { border-color: var(--c-primary) !important; background: var(--c-background-2) !important; }
/* Standalone export: hide the site-wide nav/footer since external page links
   won't resolve in an offline bundle. Just show the quiz itself. */
.site-header, .site-footer, .sticky-bar { display: none !important; }
.quiz-wrap { padding: 32px 0 64px; }
</style>

<!-- Bundler splash thumbnail — shown while assets unpack, and as the no-JS fallback -->
<template id="__bundler_thumbnail" data-bg-color="#FAF7F2">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Three overlapping shield marks matching the brand "shields-fan" logo vibe -->
    <g transform="translate(600 400)">
      <g transform="translate(-150 0) rotate(-12)">
        <path d="M -70 -90 Q -70 -110 -50 -110 L 50 -110 Q 70 -110 70 -90 L 70 40 Q 70 100 0 130 Q -70 100 -70 40 Z"
              fill="#6E3B7E" opacity="0.9"/>
      </g>
      <g transform="translate(0 -20)">
        <path d="M -70 -90 Q -70 -110 -50 -110 L 50 -110 Q 70 -110 70 -90 L 70 40 Q 70 100 0 130 Q -70 100 -70 40 Z"
              fill="#D97757"/>
      </g>
      <g transform="translate(150 0) rotate(12)">
        <path d="M -70 -90 Q -70 -110 -50 -110 L 50 -110 Q 70 -110 70 -90 L 70 40 Q 70 100 0 130 Q -70 100 -70 40 Z"
              fill="#2F7D57" opacity="0.9"/>
      </g>
    </g>
    <text x="600" y="640" text-anchor="middle" font-family="Georgia, 'Source Serif 4', serif"
          font-size="56" font-style="italic" fill="#1a1a1a">Teaching Union Match</text>
    <text x="600" y="690" text-anchor="middle" font-family="'Public Sans', system-ui, sans-serif"
          font-size="24" fill="#666" letter-spacing="2">COMPARE YOUR OPTIONS</text>
  </svg>
</template>
</head>
<body data-page="quiz" data-photo-treatment="duotone">

<main class="quiz-wrap">
  <div class="wrap">
    <div id="quiz-root"></div>
  </div>
</main>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Stub out the analytics module so src/data.js etc. don't depend on it in standalone mode -->
<script>
  window.WTU_ANALYTICS = {
    event() {},
    bindOutboundLinks() {},
  };
</script>

<script src="src/data.js?v=8"></script>
<script src="src/quiz-engine.js?v=4"></script>

<!-- After data.js has defined window.ORGS, rewrite every logo path to the
     corresponding blob URL the bundler injected into window.__resources. -->
<script>
  (function rewireLogos() {
    if (!window.__resources || !window.ORGS) return;
    // Map each org's short code to its resource id (same keys used in meta tags)
    const map = {
      neu: 'logo_neu', nasuwt: 'logo_nasuwt', edapt: 'logo_edapt',
      ascl: 'logo_ascl', naht: 'logo_naht', community: 'logo_community',
      gmb: 'logo_gmb', unison: 'logo_unison', unite: 'logo_unite',
      eis: 'logo_eis', ahds: 'logo_ahds', sls: 'logo_sls', ssta: 'logo_ssta',
      into: 'logo_into', utu: 'logo_utu', ucac: 'logo_ucac',
    };
    for (const [orgKey, org] of Object.entries(window.ORGS)) {
      const rid = map[orgKey];
      if (rid && window.__resources[rid]) org.logo = window.__resources[rid];
    }
  })();
</script>

<script src="src/layout.js?v=13"></script>
<script type="text/babel" src="src/Quiz.jsx?v=9"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('quiz-root'));
  root.render(<Quiz />);
</script>
</body>
</html>
